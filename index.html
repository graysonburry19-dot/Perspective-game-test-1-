<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>4x4 Cube Grid - Free Play Sandbox</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #d2b48c;
    font-family: sans-serif;
    touch-action: none;
  }

  canvas {
    display: block;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(255,255,255,0.28);
    padding: 12px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
    max-width: 90vw;
  }

  #status {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  #selectedColorLabel {
    font-size: 14px;
    margin-bottom: 8px;
  }

  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }

  button {
    font-size: 18px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: #f6f1e8;
  }

  button.active {
    outline: 3px solid #333;
  }

  #winMessage {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    font-weight: bold;
    color: red;
    display: none;
    z-index: 20;
  }

  #hint {
    margin-top: 8px;
    font-size: 12px;
  }
</style>
</head>

<body>

<div id="ui">
  <div id="status">Free Play Mode</div>
  <div id="selectedColorLabel">Selected: Blue</div>

  <div class="row">
    <button id="blueBtn" class="active">Blue</button>
    <button id="orangeBtn">Orange</button>
    <button id="undoBtn">Undo</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="hint">
    Tap = place block<br>
    Drag = rotate<br>
    Pinch = zoom
  </div>
</div>

<div id="winMessage">Blue Wins!</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// -------------------------
// Scene setup
// -------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd2b48c);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
document.body.appendChild(renderer.domElement);

const target = new THREE.Vector3(2, 0, 2);
let radius = 10;
let theta = Math.PI / 4;
let phi = Math.PI / 4;

function updateCamera() {
  camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(target);
}
updateCamera();

scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
dirLight.position.set(10, 10, 10);
scene.add(dirLight);

// -------------------------
// Grid
// -------------------------
const gridSize = 4;
for (let i = 0; i <= gridSize; i++) {
  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i, 0, 0),
      new THREE.Vector3(i, 0, gridSize)
    ]),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  ));

  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, i),
      new THREE.Vector3(gridSize, 0, i)
    ]),
    new THREE.LineBasicMaterial({ color: 0xffffff })
  ));
}

// -------------------------
// Game state
// -------------------------
const BLUE = 0x0000ff;
const ORANGE = 0xffa500;

const heights = Array.from({ length: 4 }, () => Array(4).fill(0));
const stacks = Array.from({ length: 4 }, () =>
  Array.from({ length: 4 }, () => [])
);

const cubes = [];
const moveHistory = [];

let selectedColor = BLUE;
let gameWon = false;

const status = document.getElementById('status');
const selectedColorLabel = document.getElementById('selectedColorLabel');
const winMessage = document.getElementById('winMessage');

function updateSelectedUI() {
  selectedColorLabel.textContent =
    selectedColor === BLUE ? "Selected: Blue" : "Selected: Orange";
}

// -------------------------
// Placement
// -------------------------
function placePiece(x, z, color) {
  if (gameWon) return;
  if (heights[x][z] >= 4) return;

  const y = heights[x][z]++;
  stacks[x][z].push(color);

  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color })
  );

  cube.position.set(x+0.5, y+0.5, z+0.5);
  scene.add(cube);

  moveHistory.push({x,z,y,color,mesh:cube});
}

// -------------------------
// Controls (Mobile + Desktop)
// -------------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(4,4),
  new THREE.MeshBasicMaterial({ visible:false })
);
plane.rotation.x = -Math.PI/2;
plane.position.set(2,0,2);
scene.add(plane);

let isDragging = false;
let moved = false;
let lastX = 0;
let lastY = 0;

window.addEventListener('pointerdown', e => {
  isDragging = true;
  moved = false;
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener('pointermove', e => {
  if (!isDragging) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

  theta += dx * 0.005;
  phi -= dy * 0.005;
  phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));

  updateCamera();

  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener('pointerup', e => {
  if (!moved) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    let hit = raycaster.intersectObject(plane);
    if (hit.length > 0) {
      const p = hit[0].point;
      const x = Math.floor(p.x);
      const z = Math.floor(p.z);
      placePiece(x, z, selectedColor);
    }
  }
  isDragging = false;
});

// Pinch zoom
let lastDist = null;

window.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (lastDist !== null) {
      radius -= (dist - lastDist) * 0.01;
      radius = Math.max(5, Math.min(20, radius));
      updateCamera();
    }
    lastDist = dist;
  }
}, { passive:false });

window.addEventListener('touchend', () => lastDist = null);

// -------------------------
// UI Buttons
// -------------------------
document.getElementById('blueBtn').onclick = () => {
  selectedColor = BLUE;
  updateSelectedUI();
};

document.getElementById('orangeBtn').onclick = () => {
  selectedColor = ORANGE;
  updateSelectedUI();
};

document.getElementById('resetBtn').onclick = () => location.reload();

// -------------------------
function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

updateSelectedUI();
</script>

</body>
</html>
