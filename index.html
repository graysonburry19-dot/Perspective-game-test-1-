<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>4x4 Cube Grid</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #d2b48c;
    font-family: sans-serif;
    touch-action: none;
  }

  canvas {
    display: block;
  }

  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(255,255,255,0.3);
    padding: 12px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }

  button {
    font-size: 18px;
    padding: 10px;
    margin: 4px;
    border-radius: 10px;
    border: none;
  }
</style>
</head>

<body>

<div id="ui">
  <button id="blueBtn">Blue</button>
  <button id="orangeBtn">Orange</button>
  <button id="undoBtn">Undo</button>
  <button id="resetBtn">Reset</button>
</div>

<!-- ✅ FIXED Three.js CDN -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>

<script>
console.log("Script running");

// -------------------------
// Scene setup
// -------------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd2b48c);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  100
);

// ✅ FIXED renderer
const renderer = new THREE.WebGLRenderer({
  antialias: true,
  alpha: false
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio || 1);
renderer.setClearColor(0xd2b48c, 1);

document.body.appendChild(renderer.domElement);

// Safety check
if (!renderer) {
  alert("WebGL failed to initialize");
}

// Camera orbit
const target = new THREE.Vector3(2, 0, 2);
let radius = 10;
let theta = Math.PI / 4;
let phi = Math.PI / 4;

function updateCamera() {
  camera.position.x = target.x + radius * Math.sin(phi) * Math.cos(theta);
  camera.position.y = target.y + radius * Math.cos(phi);
  camera.position.z = target.z + radius * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(target);
}
updateCamera();

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const light = new THREE.DirectionalLight(0xffffff, 0.6);
light.position.set(10, 10, 10);
scene.add(light);

// -------------------------
// Grid
// -------------------------
for (let i = 0; i <= 4; i++) {
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff });

  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(i, 0, 0),
      new THREE.Vector3(i, 0, 4)
    ]), mat
  ));

  scene.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, i),
      new THREE.Vector3(4, 0, i)
    ]), mat
  ));
}

// -------------------------
// Game state
// -------------------------
const BLUE = 0x0000ff;
const ORANGE = 0xffa500;

let selectedColor = BLUE;

const heights = Array.from({ length: 4 }, () => Array(4).fill(0));
const stacks = Array.from({ length: 4 }, () =>
  Array.from({ length: 4 }, () => [])
);

const cubes = [];
const history = [];

// -------------------------
// Place piece
// -------------------------
function placePiece(x, z) {
  if (x < 0 || x > 3 || z < 0 || z > 3) return;
  if (heights[x][z] >= 4) return;

  const y = heights[x][z]++;
  stacks[x][z].push(selectedColor);

  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshStandardMaterial({ color: selectedColor })
  );

  cube.position.set(x+0.5, y+0.5, z+0.5);
  scene.add(cube);

  cubes.push(cube);
  history.push({x,z,cube});
}

// -------------------------
// Raycasting
// -------------------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(4,4),
  new THREE.MeshBasicMaterial({ visible:false })
);
plane.rotation.x = -Math.PI/2;
plane.position.set(2,0,2);
scene.add(plane);

// -------------------------
// Touch + Mouse Controls
// -------------------------
let dragging = false;
let moved = false;
let lastX, lastY;

window.addEventListener("pointerdown", e => {
  dragging = true;
  moved = false;
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener("pointermove", e => {
  if (!dragging) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

  theta += dx * 0.005;
  phi -= dy * 0.005;
  phi = Math.max(0.1, Math.min(Math.PI - 0.1, phi));

  updateCamera();

  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener("pointerup", e => {
  if (!moved) {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const hit = raycaster.intersectObject(plane);

    if (hit.length) {
      const p = hit[0].point;
      placePiece(Math.floor(p.x), Math.floor(p.z));
    }
  }
  dragging = false;
});

// Pinch zoom
let lastDist = null;

window.addEventListener("touchmove", e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (lastDist !== null) {
      radius -= (dist - lastDist) * 0.01;
      radius = Math.max(5, Math.min(20, radius));
      updateCamera();
    }

    lastDist = dist;
  }
}, { passive:false });

window.addEventListener("touchend", () => lastDist = null);

// Scroll zoom (desktop)
window.addEventListener("wheel", e => {
  radius += e.deltaY * 0.01;
  radius = Math.max(5, Math.min(20, radius));
  updateCamera();
});

// -------------------------
// Buttons
// -------------------------
document.getElementById("blueBtn").onclick = () => selectedColor = BLUE;
document.getElementById("orangeBtn").onclick = () => selectedColor = ORANGE;

document.getElementById("undoBtn").onclick = () => {
  const last = history.pop();
  if (!last) return;

  scene.remove(last.cube);
  heights[last.x][last.z]--;
};

document.getElementById("resetBtn").onclick = () => location.reload();

// -------------------------
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
